<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="rgba(30, 58, 138, 0.1)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="2"/>
  
  <!-- Outer animated orb glow -->
  <defs>
    <radialGradient id="orbGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgb(59, 130, 246);stop-opacity:1" />
      <stop offset="70%" style="stop-color:rgb(96, 165, 250);stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:rgb(34, 197, 94);stop-opacity:0" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main orb -->
  <circle cx="200" cy="200" r="80" fill="url(#orbGradient)" filter="url(#glow)"/>
  
  <!-- Inner core -->
  <circle cx="200" cy="200" r="50" fill="rgb(59, 130, 246)" opacity="0.9"/>
  
  <!-- Highlight -->
  <circle cx="180" cy="180" r="25" fill="rgb(147, 197, 253)" opacity="0.6"/>
  
  <!-- Text: SynAegis -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        text-anchor="middle" fill="rgb(59, 130, 246)" letter-spacing="2">
    SynAegis
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="14" 
        text-anchor="middle" fill="rgb(96, 165, 250)" opacity="0.7">
    Live Conversation Agent
  </text>
  
  <!-- Decorative elements around the orb -->
  <circle cx="280" cy="120" r="8" fill="rgb(34, 197, 94)" opacity="0.5"/>
  <circle cx="120" cy="280" r="8" fill="rgb(34, 197, 94)" opacity="0.5"/>
  <circle cx="320" cy="200" r="6" fill="rgb(96, 165, 250)" opacity="0.4"/>
  <circle cx="80" cy="200" r="6" fill="rgb(96, 165, 250)" opacity="0.4"/>
</svg>
