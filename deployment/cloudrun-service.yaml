apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: SynAegis-live-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 40
      timeoutSeconds: 3600
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/SynAegis/SynAegis-live-backend:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: GEMINI_MODEL
              value: gemini-3-flash-live
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
