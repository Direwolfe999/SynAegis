steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/SynAegis-live-backend:${SHORT_SHA}",
        "-f",
        "deployment/Dockerfile",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/SynAegis-live-backend:${SHORT_SHA}",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy SynAegis-live-backend \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/SynAegis-live-backend:${SHORT_SHA} \
          --platform managed \
          --region ${_REGION} \
          --allow-unauthenticated \
          --port 8080 \
          --timeout 3600 \
          --set-env-vars GEMINI_MODEL=gemini-3-flash-live,GOOGLE_CLOUD_PROJECT=${PROJECT_ID} \
          --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest

substitutions:
  _REGION: us-central1
  _REPO: SynAegis

options:
  logging: CLOUD_LOGGING_ONLY
